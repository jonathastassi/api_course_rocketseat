global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Para quando a aplicação estiver rodando como container Docker
  - job_name: 'spring-boot-api-docker'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 5s
    static_configs:
      - targets: ['api-courses:8080']
    scrape_timeout: 3s

  # Para quando a aplicação estiver rodando localmente (host)
  - job_name: 'spring-boot-api-local'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 5s
    static_configs:
      - targets: ['host.docker.internal:8080']
    scrape_timeout: 3s